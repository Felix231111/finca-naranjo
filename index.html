<!DOCTYPE html>
<html lang="es">
<head>
    <title>Topografía 90° - AR Alto del Naranjo</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        model-viewer { width: 100%; height: 100vh; background-color: #f5f5f5; }
        #ar-button {
            background-color: #ff6600; /* Naranja corporativo Topografía 90° */
            border-radius: 30px; border: none;
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 16px 32px; color: white; font-weight: bold; font-size: 18px;
        }
    </style>
</head>
<body>
    <model-viewer 
    src="Sin título1.glb" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    ar-placement="floor"
    scale="1 1 1"
    shadow-intensity="1">
    <button slot="ar-button" id="ar-button">ACTIVAR LINDEROS 3D (AR)</button>
</model-viewer>
</body>
</html>
